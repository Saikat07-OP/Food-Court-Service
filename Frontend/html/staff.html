<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canteen Scanner - FoodCourt</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="stylesheet" href="../css/staff.css">

    <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

    <aside class="sidebar">
        <div class="brand"><i class="fas fa-utensils"></i> FoodCourt</div>
        <nav class="nav-links">
            <button class="nav-link active" onclick="showSection('scan')">
                <i class="fas fa-camera"></i>
                <span>Scan Orders</span>
            </button>
            <button class="nav-link" onclick="showSection('orders')">
                <i class="fas fa-clipboard-list"></i>
                <span>Order Queue</span>
            </button>
            <button class="nav-link logout" onclick="logout()" style="margin: auto 12px 20px;">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </button>
        </nav>
    </aside>

    <main class="main-content">
        <header class="header">
            <h2>Canteen Operations</h2>
            <div class="staff-badge">
                <i class="fas fa-user-circle"></i> <span id="staffName">Staff Member</span>
            </div>
        </header>

        <div class="dashboard-container">
            <div id="scanSection">
                <div class="card" style="max-width: 600px; margin: 0 auto; text-align: center;">
                    <h3 style="margin-bottom: 10px; color: var(--text-dark);">Verify Student Order</h3>
                    <p style="color: var(--text-gray); margin-bottom: 20px;">Align the QR code within the frame below</p>
                    <div id="reader"></div>
                </div>

                <div id="orderVerifyCard" class="card verify-card" style="max-width: 600px; margin: 20px auto;">
                    <div class="status-banner">
                        <i class="fas fa-check-circle" style="font-size: 1.5rem;"></i> Valid Paid Order
                    </div>

                    <div class="order-details-grid">
                        <div class="detail-group">
                            <p>Order ID</p>
                            <h4 id="dispOrderId">#ORD123</h4>
                        </div>
                        <div class="detail-group">
                            <p>Student Name</p>
                            <h4 id="dispName">Student Name</h4>
                        </div>
                    </div>

                    <h3 style="margin-bottom: 15px; font-size: 1.1rem; color: var(--text-dark);">Items to Serve:</h3>
                    <ul id="dispItems" class="food-list"></ul>

                    <button class="btn-confirm" onclick="confirmServe()">
                        <i class="fas fa-bell"></i> Confirm Food Served
                    </button>
                </div>

                <div class="card" style="margin-top: 20px;">
                    <h3 style="display: flex; justify-content: space-between;">
                        <span><i class="fas fa-history"></i> Served Today</span>
                        <span id="servedCount" class="badge-count">0</span>
                    </h3>
                    <div id="recentlyServedList"></div>
                </div>
            </div>

            <div id="ordersSection" style="display:none;">
                <div class="card">
                    <h3>Pending Pickup Queue</h3>
                    <p style="color: var(--text-gray); margin-top: 10px;">Orders waiting to be scanned...</p>
                    <div id="pendingList"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/staff.js"></script>
</body>

</html>
