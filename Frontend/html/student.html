<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodCourt - Student Dashboard</title>
    <link rel="stylesheet" href="../css/student.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="brand"><i class="fas fa-utensils"></i> FoodCourt</div>
            <nav class="nav-links">
                <button class="nav-link active" onclick="showSection('menu')">
                    <i class="fas fa-th-large"></i> <span>Menu</span>
                </button>
                <button class="nav-link" onclick="showSection('orders')">
                    <i class="fas fa-shopping-bag"></i> <span>My Orders</span>
                </button>
                <button class="nav-link" onclick="showSection('wallet')">
                    <i class="fas fa-wallet"></i> <span>Wallet</span>
                </button>
                <button class="nav-link logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
                </button>
            </nav>
        </aside>

        <main class="content">
            <header class="header">
                <div class="header-left">
                    <div class="greeting">
                        <h2>Welcome, <span id="studentName">Student</span></h2>
                        <p>What's on the menu today?</p>
                    </div>
                </div>
                <div class="user-actions">
                    <button class="cart-btn" onclick="viewCart()">
                        <i class="fas fa-shopping-cart"></i>
                        <span id="cartCount" class="badge">0</span>
                    </button>
                </div>
            </header>

            <div id="menuSection">
                <div class="student-search-header">
                    <h2>Today's Menu</h2>
                    <div class="student-search-wrapper">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" id="studentMenuSearch" class="search-input"
                            placeholder="What are you craving?" onkeyup="filterStudentMenu()">
                    </div>
                </div>

                <div class="category-filters" id="categoryFilters">
                    <button class="filter-pill active" onclick="filterByCategory('all', this)">All Items</button>
                    <button class="filter-pill" onclick="filterByCategory('breakfast', this)">Breakfast</button>
                    <button class="filter-pill" onclick="filterByCategory('lunch', this)">Lunch</button>
                    <button class="filter-pill" onclick="filterByCategory('snacks', this)">Snacks</button>
                    <button class="filter-pill" onclick="filterByCategory('dinner', this)">Dinner</button>
                </div>

                <div id="menuGrid" class="food-grid"></div>
            </div>

            <div id="ordersSection" style="display:none;">
                <div class="card">
                    <h3>Order History</h3>
                    <div id="historyList" class="list-group"></div>
                </div>
            </div>

            <div id="walletSection" style="display:none;">
                <div class="card">
                    <h3>My Wallet</h3>
                    <p>Wallet features coming soon...</p>
                </div>
            </div>
        </main>
    </div>

    <div id="qrModal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000;">
        <div
            style="background: white; padding: 30px; border-radius: 12px; text-align: center; max-width: 300px; margin: 20vh auto; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">
            <h3 style="color: var(--primary); margin-bottom: 15px;">Your Order QR</h3>
            <img id="modalQrImage" src="" alt="QR Code"
                style="width: 200px; height: 200px; margin-bottom: 20px; border: 2px solid #eee; border-radius: 10px; padding: 10px;" />
            <br>
            <button class="btn" style="background: #666; width: 100%;"
                onclick="document.getElementById('qrModal').style.display='none'">Close</button>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/student.js"></script>
</body>

</html>
